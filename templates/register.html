<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<style>

body{
font-family:Arial;
background:#1c2833;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#2c3e50;
padding:30px;
border-radius:10px;
width:350px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
background:#27ae60;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form action="/register" method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<br>

<button type="submit">Register</button>

</form>

<br>

<a href="/login" style="color:white">Already have account? Login</a>

</div>

</body>
</html>
