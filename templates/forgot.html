<!DOCTYPE html>
<html>
<head>

<title>Reset Password</title>

<style>

body{
font-family:Arial;
background:#2c3e50;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#34495e;
padding:30px;
border-radius:10px;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
background:#f39c12;
border:none;
padding:10px 20px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Reset Password</h2>

<form action="/forgot" method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="newpassword" placeholder="New Password" required>

<br>

<button type="submit">Update</button>

</form>

</div>

</body>
</html>
