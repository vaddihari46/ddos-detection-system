<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
font-family:Arial;
background:#34495e;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#2c3e50;
padding:30px;
border-radius:10px;
width:350px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
background:#e74c3c;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>User Login</h2>

<form action="/login" method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<br>

<button type="submit">Login</button>

</form>

<br>

<a href="/forgot" style="color:white">Forgot Password?</a>

</div>

</body>
</html>
